<!DOCTYPE html>
<html lang="vi"><head><meta charset="UTF-8"><title>Demo Kho Hải Hậu: 4 xe vs 5 xe</title>
<style>
body{font-family:'Segoe UI',sans-serif;background:#111;color:#eee;padding:20px;max-width:1400px;margin:auto;font-size:13px}
h1{color:#f093fb;font-size:1.5rem;margin-bottom:4px}
h2{color:#667eea;margin-top:28px;font-size:1.15rem;border-bottom:1px solid #333;padding-bottom:6px}
h3{color:#4fd1c5;margin-top:20px;font-size:1rem}
.subtitle{color:#888;font-size:0.85rem;margin-bottom:20px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin:16px 0}
.scenario{background:#1a1a2e;border-radius:12px;padding:18px;border:1px solid #333}
.scenario h3{margin-top:0;font-size:1.05rem}
.s-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:12px 0}
.s-card{background:rgba(255,255,255,0.04);padding:10px;border-radius:8px;text-align:center;border:1px solid #333}
.s-val{font-size:1.6rem;font-weight:800}
.s-lbl{font-size:0.7rem;color:#888;text-transform:uppercase;margin-top:3px}
table{width:100%;border-collapse:collapse;margin:8px 0;font-size:0.8rem}
th{background:rgba(102,126,234,0.1);padding:7px 8px;text-align:left;font-size:0.7rem;color:#888;text-transform:uppercase;border-bottom:1px solid #333}
td{padding:6px 8px;border-bottom:1px solid #222}
.badge{display:inline-block;padding:2px 9px;border-radius:12px;color:#fff;font-weight:600;font-size:0.73rem}
.wh-row{background:rgba(102,126,234,0.06)}
.shop-row{background:rgba(246,173,85,0.08);color:#f6ad55;border-top:2px dashed rgba(246,173,85,0.25);border-bottom:2px dashed rgba(246,173,85,0.25)}
.warn{color:#fc8181;font-weight:700}.ok{color:#68d391;font-weight:700}
.compare-table{margin:16px 0}
.compare-table th{background:rgba(240,147,251,0.1)}
.vehicle-hdr{margin:14px 0 4px;padding:10px 12px;border-radius:8px;background:#151525;border-left:4px solid;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px}
.vehicle-hdr h4{margin:0;font-size:0.9rem}
.vehicle-hdr p{margin:2px 0 0;font-size:0.76rem;color:#888}
.pill{padding:2px 8px;border-radius:12px;font-size:0.7rem;font-weight:600}
.verdict{margin-top:24px;padding:16px;border-radius:12px;border:1px solid #333;background:#1a1a2e}
.verdict h3{margin-top:0;color:#f6ad55}
</style>
</head><body>

<h1>🚛 Demo Kho Hải Hậu: Kịch Bản 4 Xe vs 5 Xe</h1>
<p class="subtitle">Chỉ demo — chưa thay đổi lộ trình chính</p>
<div id="output">Đang tính toán...</div>

<script src="data/config.js"></script>
<script src="data/stores.js"></script>
<script src="js/vrp-solver.js"></script>
<script>
// =============================================
// Lấy danh sách cửa hàng thuộc Kho Hải Hậu
// =============================================
const KHO_HH = CONFIG.warehouses.find(w => w.id === 'kho_hai_hau');
const hhDistricts = ['H. Hải Hậu', 'H. Giao Thủy', 'H. Xuân Trường', 'H. Trực Ninh'];
const nghiaHungSouth = [33, 34, 35, 36];

const hhStores = STORES.filter(s =>
  hhDistricts.includes(s.district) ||
  (s.district === 'H. Nghĩa Hưng' && nghiaHungSouth.includes(s.id))
);

// =============================================
// Hàm chia đều N chuyến (balanced split)
// =============================================
function buildFixedTrips(stores, warehouse, numVehicles) {
  // Phân cụm theo khu vực địa lý (sắp xếp theo góc từ kho)
  const withAngle = stores.map(s => {
    const angle = Math.atan2(s.lng - warehouse.lng, s.lat - warehouse.lat);
    return { ...s, angle };
  });
  withAngle.sort((a, b) => a.angle - b.angle);

  // Chia đều
  const trips = [];
  const perVehicle = Math.ceil(withAngle.length / numVehicles);
  for (let i = 0; i < numVehicles; i++) {
    const chunk = withAngle.slice(i * perVehicle, Math.min((i + 1) * perVehicle, withAngle.length));
    if (chunk.length > 0) trips.push(chunk);
  }
  return trips;
}

// =============================================
// Tối ưu và tính chi tiết cho mỗi kịch bản
// =============================================
function runScenario(numVehicles) {
  const trips = buildFixedTrips(hhStores, KHO_HH, numVehicles);
  const colors = ['#f093fb', '#4fd1c5', '#f6ad55', '#fc8181', '#68d391', '#63b3ed'];
  const vehicles = [];

  trips.forEach((trip, idx) => {
    let route = VRPSolver.nearestNeighborRoute(trip, KHO_HH);
    route = VRPSolver.twoOptImprove(route, KHO_HH);
    const detail = VRPSolver.calculateRouteDetails(route, KHO_HH, idx + 1, colors[idx % colors.length]);
    vehicles.push(detail);
  });

  const totalKm = vehicles.reduce((s, v) => s + v.totalDistance, 0);
  const maxKm = Math.max(...vehicles.map(v => v.totalDistance));
  const minKm = Math.min(...vehicles.map(v => v.totalDistance));
  const avgKm = totalKm / vehicles.length;

  return { vehicles, totalKm: Math.round(totalKm * 10) / 10, maxKm: Math.round(maxKm * 10) / 10, minKm: Math.round(minKm * 10) / 10, avgKm: Math.round(avgKm * 10) / 10 };
}

const sc4 = runScenario(4);
const sc5 = runScenario(5);

// =============================================
// Render kết quả
// =============================================
let h = '';

// Tổng quan stores
h += `<div style="padding:12px 16px;background:#1a1a2e;border-radius:10px;border-left:4px solid #f093fb;margin-bottom:20px">
  <strong style="color:#f093fb">🏭 Kho Hải Hậu</strong> — Tọa độ: ${KHO_HH.lat}, ${KHO_HH.lng}<br>
  <span style="color:#888">Phụ trách: Hải Hậu, Giao Thủy, Xuân Trường, Trực Ninh + ½ Nghĩa Hưng (Nam)</span><br>
  <strong>${hhStores.length} cửa hàng</strong> • Tổng hàng: ${hhStores.length * 50} kg
</div>`;

// Bảng so sánh
h += '<h2>📊 So Sánh 2 Kịch Bản</h2>';
h += '<table class="compare-table"><thead><tr><th>Chỉ số</th><th>4 Xe</th><th>5 Xe</th><th>Chênh lệch</th></tr></thead><tbody>';
h += `<tr><td><strong>Số xe</strong></td><td>4</td><td>5</td><td>+1 xe</td></tr>`;
h += `<tr><td><strong>TB điểm/xe</strong></td><td>${Math.round(hhStores.length/4*10)/10}</td><td>${Math.round(hhStores.length/5*10)/10}</td><td>${Math.round((hhStores.length/4-hhStores.length/5)*10)/10} điểm</td></tr>`;
h += `<tr><td><strong>Tổng km</strong></td><td>${sc4.totalKm} km</td><td>${sc5.totalKm} km</td><td>${Math.round((sc4.totalKm-sc5.totalKm)*10)/10} km</td></tr>`;
h += `<tr><td><strong>TB km/xe</strong></td><td class="${sc4.avgKm>100?'warn':'ok'}">${sc4.avgKm} km</td><td class="${sc5.avgKm>100?'warn':'ok'}">${sc5.avgKm} km</td><td>${Math.round((sc4.avgKm-sc5.avgKm)*10)/10} km</td></tr>`;
h += `<tr><td><strong>Xe chạy nhiều nhất</strong></td><td class="${sc4.maxKm>100?'warn':'ok'}">${sc4.maxKm} km</td><td class="${sc5.maxKm>100?'warn':'ok'}">${sc5.maxKm} km</td><td>${Math.round((sc4.maxKm-sc5.maxKm)*10)/10} km</td></tr>`;
h += `<tr><td><strong>Xe chạy ít nhất</strong></td><td>${sc4.minKm} km</td><td>${sc5.minKm} km</td><td>${Math.round((sc4.minKm-sc5.minKm)*10)/10} km</td></tr>`;

const maxTime4 = Math.max(...sc4.vehicles.map(v => v.totalTime));
const maxTime5 = Math.max(...sc5.vehicles.map(v => v.totalTime));
h += `<tr><td><strong>Thời gian dài nhất (Winmart)</strong></td><td>${Math.floor(maxTime4/60)}h${maxTime4%60}p</td><td>${Math.floor(maxTime5/60)}h${maxTime5%60}p</td><td>—</td></tr>`;

const over100_4 = sc4.vehicles.filter(v => v.totalDistance > 100).length;
const over100_5 = sc5.vehicles.filter(v => v.totalDistance > 100).length;
h += `<tr><td><strong>Xe vượt 100km</strong></td><td class="${over100_4>0?'warn':'ok'}">${over100_4>0?over100_4+' xe ⚠️':'0 xe ✅'}</td><td class="${over100_5>0?'warn':'ok'}">${over100_5>0?over100_5+' xe ⚠️':'0 xe ✅'}</td><td>—</td></tr>`;
h += '</tbody></table>';

// Chi tiết từng kịch bản
function renderScenario(sc, label) {
  let s = `<h2>${label}</h2>`;
  // Summary row
  s += '<div class="s-row">';
  sc.vehicles.forEach(v => {
    const km = v.totalDistance;
    const cls = km > 100 ? 'warn' : 'ok';
    s += `<div class="s-card">
      <div class="s-val" style="color:${v.color}">Xe ${v.id}</div>
      <div class="s-lbl">${v.totalStops} điểm • <span class="${cls}">${km} km</span></div>
    </div>`;
  });
  s += '</div>';

  // Detail per vehicle
  sc.vehicles.forEach(v => {
    const wm = KHO_HH;
    const lastStop = v.stores[v.stores.length - 1];
    const lastDepMin = parseInt(lastStop.departureTime.split(':')[0]) * 60 + parseInt(lastStop.departureTime.split(':')[1]);
    const otherEndMin = lastDepMin + 180;
    const otherEnd = String(Math.floor(otherEndMin/60)).padStart(2,'0') + ':' + String(otherEndMin%60).padStart(2,'0');
    const retMin = otherEndMin + Math.round(v.returnDistance / 45 * 60);
    const finalRet = String(Math.floor(retMin/60)).padStart(2,'0') + ':' + String(retMin%60).padStart(2,'0');
    const kmCls = v.totalDistance > 100 ? 'warn' : 'ok';

    s += `<div class="vehicle-hdr" style="border-color:${v.color}">
      <div>
        <h4><span class="badge" style="background:${v.color}">Xe ${v.id}</span> <span class="${kmCls}">${v.totalDistance} km</span></h4>
        <p>${v.districts.join(', ')} • ${v.totalStops} điểm • ${v.totalWeight} kg
          <span class="pill" style="background:rgba(79,209,197,0.15);color:#4fd1c5">07:00 → ${finalRet}</span>
        </p>
      </div>
    </div>`;

    s += '<table><thead><tr><th>TT</th><th>Cửa hàng</th><th>Địa chỉ</th><th>Đến</th><th>Rời</th><th>+km</th><th>Tổng</th><th>Tốc độ</th></tr></thead><tbody>';
    s += `<tr class="wh-row"><td>🏭</td><td><strong>Xuất phát Kho Hải Hậu</strong></td><td style="color:#888">${wm.lat.toFixed(4)}, ${wm.lng.toFixed(4)}</td><td>—</td><td><strong>07:00</strong></td><td>—</td><td>0</td><td>—</td></tr>`;

    v.stores.forEach((st, i) => {
      s += `<tr><td><span class="badge" style="background:${v.color}">${i+1}</span></td><td><strong>${st.store.name}</strong></td><td>${st.store.address}, <em style="color:#888">${st.store.district}</em></td><td>${st.arrivalTime}</td><td>${st.departureTime}</td><td>+${st.distanceFromPrev}</td><td>${st.cumulativeDistance}</td><td>${st.speed} km/h</td></tr>`;
    });

    s += `<tr class="shop-row"><td>📦</td><td><strong>Shop khác (3 tiếng)</strong></td><td style="color:#f6ad55">Khu vực lân cận</td><td>${lastStop.departureTime}</td><td>${otherEnd}</td><td colspan="2" style="text-align:center"><em>~3h</em></td><td>—</td></tr>`;
    s += `<tr class="wh-row"><td>🏠</td><td><strong>Về Kho Hải Hậu</strong></td><td style="color:#888">Kết thúc ca</td><td><strong>${finalRet}</strong></td><td>—</td><td>+${v.returnDistance}</td><td>${v.totalDistance}</td><td>—</td></tr>`;
    s += '</tbody></table>';
  });
  return s;
}

h += renderScenario(sc4, '🚛 KỊCH BẢN A: 4 XE');
h += renderScenario(sc5, '🚛 KỊCH BẢN B: 5 XE');

// Verdict
h += `<div class="verdict">
  <h3>💡 Nhận Xét Sơ Bộ</h3>
  <table><tbody>
    <tr><td style="width:100px"><strong>4 xe:</strong></td><td>TB ${sc4.avgKm} km/xe, xe cao nhất ${sc4.maxKm} km. ${over100_4>0 ? `<span class="warn">Có ${over100_4} xe vượt 100km ⚠️</span> — sẽ cần cân nhắc nếu muốn giữ ≤100km.` : '<span class="ok">Tất cả ≤100km ✅</span>'}</td></tr>
    <tr><td><strong>5 xe:</strong></td><td>TB ${sc5.avgKm} km/xe, xe cao nhất ${sc5.maxKm} km. ${over100_5>0 ? `<span class="warn">Có ${over100_5} xe vượt 100km ⚠️</span>` : '<span class="ok">Tất cả ≤100km ✅</span>'} — Thoải mái hơn, mỗi xe ít điểm hơn.</td></tr>
    <tr><td><strong>Chi phí:</strong></td><td>5 xe tốn thêm 1 xe (lương tài xế, xăng dầu cố định) nhưng quãng đường/xe giảm ${Math.round((sc4.avgKm-sc5.avgKm)*10)/10} km → tiết kiệm xăng biến đổi.</td></tr>
  </tbody></table>
</div>`;

document.getElementById('output').innerHTML = h;
</script>
</body></html>
