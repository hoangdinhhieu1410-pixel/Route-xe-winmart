<!DOCTYPE html>
<html lang="vi"><head><meta charset="UTF-8"><title>🏔️ Demo Ninh Bình — 5 xe Nho Quan + 4 xe Yên Khánh</title>
<style>
body{font-family:'Segoe UI',sans-serif;background:#111;color:#eee;padding:20px;max-width:1400px;margin:auto;font-size:13px}
h1{color:#f6ad55;font-size:1.5rem}
h2{color:#fc8181;margin-top:24px;font-size:1.1rem;border-bottom:1px solid #333;padding-bottom:6px}
.summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin:16px 0}
.s-card{background:#1a1a2e;padding:14px;border-radius:10px;text-align:center;border:1px solid #333}
.s-val{font-size:1.8rem;font-weight:800;color:#f6ad55}
.s-lbl{font-size:0.75rem;color:#888;text-transform:uppercase;margin-top:4px}
table{width:100%;border-collapse:collapse;margin:8px 0;font-size:0.82rem}
th{background:#1a1a2e;padding:8px 10px;text-align:left;font-size:0.72rem;color:#888;text-transform:uppercase;border-bottom:1px solid #333}
td{padding:7px 10px;border-bottom:1px solid #222}
.wh{background:rgba(246,173,85,0.08)}
.shop{background:rgba(246,173,85,0.1);color:#f6ad55;border-top:2px dashed rgba(246,173,85,0.3);border-bottom:2px dashed rgba(246,173,85,0.3)}
.badge{display:inline-block;padding:2px 10px;border-radius:12px;color:#fff;font-weight:600;font-size:0.75rem}
.vehicle-header{display:flex;align-items:center;gap:12px;margin:16px 0 6px;padding:12px 14px;border-radius:10px;background:#1a1a2e;border-left:4px solid;flex-wrap:wrap}
.vehicle-header h3{font-size:0.95rem;margin:0}
.vehicle-header p{font-size:0.78rem;color:#888;margin:2px 0 0}
.pill{padding:3px 10px;border-radius:14px;font-size:0.72rem;font-weight:600;margin-left:8px}
.warn{color:#fc8181;font-weight:600}
.ok{color:#68d391;font-weight:600}
.zone-box{padding:12px 16px;background:#1a1a2e;border-radius:10px;margin:8px 0;border-left:4px solid}
.zone-box strong{display:block;margin-bottom:4px}
.zone-box ul{margin:4px 0 0 16px;font-size:0.82rem;color:#a0a0b8}
.overview-table{margin:16px 0}
.overview-table table{background:#1a1a2e;border-radius:8px;overflow:hidden}
.overview-table td{vertical-align:middle}
.district-tag{display:inline-block;padding:2px 8px;border-radius:6px;background:rgba(255,255,255,0.06);font-size:0.72rem;margin:1px 2px;color:#ccc}
.kho-section{margin:20px 0;padding:16px;background:#0d0d1a;border-radius:12px;border:1px solid #222}
.kho-title{font-size:1.1rem;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px}
</style>
</head><body>
<h1>🏔️ Demo Ninh Bình — Kịch Bản 5+4 Xe</h1>
<p style="color:#888;margin-top:-8px">Kho Nho Quan: <strong style="color:#f6ad55">5 xe</strong> | Kho Yên Khánh: <strong style="color:#fc8181">4 xe</strong> | Giới hạn ≤100km/xe</p>

<div id="output">Đang tính toán...</div>

<script src="data/config.js"></script>
<script src="data/stores.js"></script>
<script src="data/ha_nam_stores.js"></script>
<script src="data/ninh_binh_stores.js"></script>
<script src="js/vrp-solver.js"></script>
<script>

// Override: cố định 5 xe Nho Quan + 6 xe Yên Khánh
const DEMO_CONFIG = JSON.parse(JSON.stringify(CONFIG.provinces.ninh_binh));
DEMO_CONFIG.fixedVehicles = {
  'kho_nho_quan': 5,
  'kho_yen_khanh': 4
};
DEMO_CONFIG.getStores = () => NINH_BINH_STORES;

// Tạm ghi đè config
const origConfig = CONFIG.provinces.ninh_binh;
CONFIG.provinces.ninh_binh_demo = DEMO_CONFIG;

const r = VRPSolver.solve('ninh_binh_demo');
const pConfig = DEMO_CONFIG;

let h = '';

// ===== SUMMARY =====
h += '<div class="summary">';
h += `<div class="s-card"><div class="s-val">${r.summary.totalVehicles}</div><div class="s-lbl">Tổng xe</div></div>`;
h += `<div class="s-card"><div class="s-val">${r.summary.totalStores}</div><div class="s-lbl">Điểm giao</div></div>`;
h += `<div class="s-card"><div class="s-val">${r.summary.totalDistance}</div><div class="s-lbl">Tổng km</div></div>`;
h += `<div class="s-card"><div class="s-val">${r.summary.avgDistancePerVehicle}</div><div class="s-lbl">TB km/xe</div></div>`;
h += `<div class="s-card"><div class="s-val">${r.summary.avgStopsPerVehicle}</div><div class="s-lbl">TB điểm/xe</div></div>`;
h += `<div class="s-card"><div class="s-val">${(r.summary.totalStores * 50).toLocaleString()} kg</div><div class="s-lbl">Tổng hàng WM</div></div>`;
h += '</div>';

// ===== PHÂN VÙNG KHO =====
h += '<h2>🗺️ Phân Vùng Kho</h2>';
pConfig.warehouses.forEach(w => {
  const districts = pConfig.warehouseAssignment[w.id] || [];
  const wb = r.summary.warehouseBreakdown[w.id];
  const fixedCount = pConfig.fixedVehicles[w.id] || '?';
  h += `<div class="zone-box" style="border-color:${w.color}">
    <strong style="color:${w.color}">🏭 ${w.name} — ${fixedCount} xe cố định</strong>
    <ul>${districts.map(d => `<li>${d}</li>`).join('')}
    <li style="color:${w.color};font-weight:600">→ ${wb?.stores || 0} cửa hàng, ${wb?.distance || 0} km tổng</li></ul>
  </div>`;
});

// ===== BẢNG TỔNG QUAN XE =====
h += '<h2>🗺️ Tổng Quan Xe — Khu Vực & Quãng Đường</h2>';
h += '<div class="overview-table"><table><thead><tr><th>Xe</th><th>Kho</th><th>Huyện đi qua</th><th>Điểm</th><th>Tổng km</th><th>TG Winmart</th><th>+ Shop</th><th>Tổng ca</th><th>Trạng thái</th></tr></thead><tbody>';

r.vehicles.forEach(v => {
  const wm = pConfig.warehouses.find(w => w.id === v.warehouseId);
  const wmH = Math.floor(v.totalTime / 60), wmM = v.totalTime % 60;
  const wmStr = `${wmH}h${wmM > 0 ? wmM + 'p' : ''}`;
  const lastStop = v.stores[v.stores.length - 1];
  const lastDepMin = parseInt(lastStop.departureTime.split(':')[0]) * 60 + parseInt(lastStop.departureTime.split(':')[1]);
  const totalCaMin = lastDepMin + 180 + Math.round(v.returnDistance / 45 * 60) - 420;
  const totalCaH = Math.floor(totalCaMin / 60), totalCaM = totalCaMin % 60;
  const totalCaStr = `${totalCaH}h${totalCaM > 0 ? totalCaM + 'p' : ''}`;
  const kmOk = v.totalDistance <= 100;

  h += `<tr>
    <td><span class="badge" style="background:${v.color}">🚛 Xe ${v.id}</span></td>
    <td style="color:${wm?.color || '#fff'}">${v.warehouseName}</td>
    <td>${v.districts.map(d => `<span class="district-tag">${d}</span>`).join('')}</td>
    <td><strong>${v.totalStops}</strong></td>
    <td><strong>${v.totalDistance}</strong> km</td>
    <td>${wmStr}</td>
    <td>3h</td>
    <td><strong>${totalCaStr}</strong></td>
    <td>${kmOk ? '<span class="ok">✅ ≤100km</span>' : '<span class="warn">⚠️ >100km</span>'}</td>
  </tr>`;
});
h += '</tbody></table></div>';

// ===== LỊCH TRÌNH CHI TIẾT =====
h += '<h2>📅 Lịch Trình Chi Tiết Từng Xe</h2>';

// Group by warehouse
pConfig.warehouses.forEach(w => {
  const wVehicles = r.vehicles.filter(v => v.warehouseId === w.id);
  if (wVehicles.length === 0) return;

  h += `<div class="kho-section">`;
  h += `<div class="kho-title" style="color:${w.color}">🏭 ${w.name} — ${wVehicles.length} xe</div>`;

  wVehicles.forEach(v => {
    const wm = w;
    const lastStop = v.stores[v.stores.length - 1];
    const lastDepMin = parseInt(lastStop.departureTime.split(':')[0]) * 60 + parseInt(lastStop.departureTime.split(':')[1]);
    const otherEndMin = lastDepMin + 180;
    const otherEnd = String(Math.floor(otherEndMin/60)).padStart(2,'0') + ':' + String(otherEndMin%60).padStart(2,'0');
    const retMin = otherEndMin + Math.round(v.returnDistance / 45 * 60);
    const finalRet = String(Math.floor(retMin/60)).padStart(2,'0') + ':' + String(retMin%60).padStart(2,'0');
    const kmOk = v.totalDistance <= 100;

    h += `<div class="vehicle-header" style="border-color:${v.color}">
      <div style="flex:1">
        <h3><span class="badge" style="background:${v.color}">Xe ${v.id}</span> ${v.warehouseName} ${kmOk ? '<span class="ok">✅ ≤100km</span>' : '<span class="warn">⚠️ >100km</span>'}</h3>
        <p>${v.districts.join(', ')} • ${v.totalStops} điểm • <strong>${v.totalDistance} km</strong> • ${v.totalWeight} kg
          <span class="pill" style="background:rgba(79,209,197,0.2);color:#4fd1c5">07:00 → ${finalRet}</span>
        </p>
      </div>
    </div>`;

    h += '<table><thead><tr><th>TT</th><th>Hoạt động</th><th>Địa chỉ</th><th>Đến</th><th>Rời</th><th>+km</th><th>Tổng km</th><th>Tốc độ</th></tr></thead><tbody>';
    h += `<tr class="wh"><td>🏭</td><td><strong>Xuất phát - ${wm.name}</strong></td><td style="color:#888">${wm.lat.toFixed(4)}, ${wm.lng.toFixed(4)}</td><td>—</td><td><strong>07:00</strong></td><td>—</td><td>0</td><td>—</td></tr>`;

    v.stores.forEach((s, i) => {
      h += `<tr><td><span class="badge" style="background:${v.color}">${i+1}</span></td><td><strong>${s.store.name}</strong></td><td>${s.store.address}, <em style="color:#888">${s.store.district}</em></td><td>${s.arrivalTime}</td><td>${s.departureTime}</td><td>+${s.distanceFromPrev}</td><td>${s.cumulativeDistance}</td><td>${s.speed} km/h</td></tr>`;
    });

    h += `<tr class="shop"><td>📦</td><td><strong>Giao hàng shop khác</strong> <span style="font-size:0.7rem;opacity:0.7">(30% tải, 3h)</span></td><td style="color:#f6ad55">Các điểm shop khác</td><td>${lastStop.departureTime}</td><td>${otherEnd}</td><td colspan="2" style="text-align:center"><em>~3 tiếng</em></td><td>—</td></tr>`;
    h += `<tr class="wh"><td>🏠</td><td><strong>Về ${wm.name}</strong></td><td style="color:#888">Kết thúc ca</td><td><strong>${finalRet}</strong></td><td>—</td><td>+${v.returnDistance}</td><td>${v.totalDistance}</td><td>—</td></tr>`;
    h += '</tbody></table>';
  });

  h += '</div>';
});

document.getElementById('output').innerHTML = h;
</script>
</body></html>
